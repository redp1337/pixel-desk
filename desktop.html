<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
        <script src="music-player.js" defer></script>
        <script src="taskbar.js" defer></script>
        <script src="notepad.js" defer></script>
        <script src="window-manager.js" defer></script>
        <script src="recipe-folder.js" defer></script>
    </head>
    <body>
        <div class="background">
            <!-- icon container on taskbar -->
            <div class="taskbar">
                <div class="icons-container-taskbar">
                    <div id="notepad-icon-taskbar"><img src="img/notepad.png" width="95px" height="80px"></div>
                    <div id="notes-folder-taskbar"><img src="img/notes-folder-icon.png" width="95px" height="80px"></div>
                    <div id="music-player-taskbar"><img src="img/music-player-icon.png" width="95px" height="80px"></div>
                    <div id="recipe-book-taskbar"><img src="img/recipe-book.png" width="95px" height="80px"></div>
                </div>
                <div id="clock"></div>
            </div>
            <!-- icon container on desktop screen -->
            <div class="icons-container-screen">
                <div class ="icon-box">
                    <div id="notepad-icon-desktop"><img src="./img/notepad.png" width="115px" height="105px"></div>
                    <div class="icon-title">Notepad</div>
                </div>
                <div class="icon-box">
                    <div id="notes-folder-icon-desktop"><img src="./img/notes-folder-icon.png" width="115px" height="105px"></div>
                    <div class="icon-title">Notes Folder</div>
                </div>
                <div class="icon-box">
                    <div id="music-player-icon-desktop"><img src="./img/music-player-icon.png" width="115px" height="105px"></div>
                    <div class="icon-title">Music Player</div>
                </div>
                <div class="icon-box">
                    <div id="recipe-book-desktop"><img src="./img/recipe-book.png" width="115px" height="105px"></div>
                    <div class="icon-title">Recipe Book</div>
                </div>
            </div>

            <!-- music player UI -->
            <div id="music-player-window" class="window">
                <div class="window-bar">Music Player
                    <div class="close-window-button">x</div>
                </div>
                
                <div class="screen-container">
                    <div id="screen" class="music-screen">
                        <div id="song-title"></div>
                    </div>
                </div>

                <div class="controls">
                    <div id="play" class="play">play</div>
                    <div id="stop" class="play">stop</div>
                    <div id="next" class="next">next</div>
                    <div id="back" class="back">back</div>
                </div>
            </div>

            <!-- notes folder window -->
            <div id="notes-folder-window" class="window">
                <div class ="window-bar"> Notes Folder
                    <div class="close-window-button">X</div>
                </div>

                <div id="notes-area-container">
                    <div id="notes-area">
                        <!-- populated dynamically by notepad.js -->
                        </div>
                    </div>

        </div>
        </div>
                <!-- notepad window -->
            <div id="notepad-window" class="window">
                <div class="window-bar">Notepad
                    <div class="close-window-button">x</div>
                </div>
                <div class="content-container">
                    <div class="title-note-container">
                        <div>title</div>
                        <div id="title-note"><input type="text" placeholder="Enter a title for this note" style="width: 450px"></div>
                    </div>
                    <div id="content-note"><textarea placeholder="Start typing..."></textarea></div>
                    <button id="save-button">Save</button>
                </div>           
            </div>

                 <!-- recipe window -->
            <div id="grape-window" class="window">
                <div class="window-bar">
                    Recipe Book
                    <button class="close-window-button" id="close-grape">X</button>
                </div>
                <div class="window-content"></div>
            </div>
            </div>
        <audio id="click-sound" src="sounds/click.mp3"></audio>
    </body>
</html>
