<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="background">
            <!-- icon container on taskbar -->
            <div class="taskbar">
                <div class="icons-container-taskbar">
                    <div id="notepad-icon"><img src="img/notepad.png" width="95px" height="80px"></div>
                    <div id="notes-folder-icon"><img src="img/notes-folder-icon.png" width="95px" height="80px"></div>
                    <div id="music-player-icon"><img src="img/music-player-icon.png" width="95px" height="80px"></div>
                    <div id="recipe-book-icon"><img src="img/recipe-book.png" width="95px" height="80px"></div>
                </div>
            </div>
            <!-- icon container on desktop screen -->
            <div class="icons-container-screen">
                <div class ="icon-box">
                    <div id="notepad-icon"><img src="img/notepad.png" width="115px" height="105px"></div>
                    <div class="icon-title">Notepad</div>
                </div>
                <div class="icon-box">
                    <div id="notes-folder-icon"><img src="img/notes-folder-icon.png" width="115px" height="105px"></div>
                    <div class="icon-title">Notes Folder</div>
                </div>
                <div class="icon-box">
                    <div id="music-player-icon"><img src="img/music-player-icon.png" width="115px" height="105px""></div>
                    <div class="icon-title">Music Player</div>
                </div>
                <div class="icon-box">
                    <div id="recipe-book-icon"><img src="img/recipe-book.png" width="115px" height="105px"></div>
                    <div class="icon-title">Recipe Book</div>
                </div>
            </div>

        </div>
    </body>
</html>
