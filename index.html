<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Desktop UI</title>

    <link rel="stylesheet" href="styles.css">

    <script src="script.js" defer></script>
    <script src="recipe-book.js" defer></script>
</head>

<body>

<div class="background">

    <!-- TASKBAR -->
    <div class="taskbar">
        <div class="icons-container-taskbar">
            <div id="recipe-book-icon-taskbar">
                <img src="img/recipe-book.png" width="60">
            </div>

            <!-- ADD NOTEPAD ICON -->
            <div id="notepad-icon">
                <img src="img/notepad.png" width="60">
            </div>
        </div>

        <div id="clock"></div>
    </div>

    <!-- DESKTOP ICON -->
    <div class="icons-container-screen">
        <div class="icon-box">
            <div id="recipe-book-icon-desktop">
                <img src="./img/recipe-book.png" width="100">
            </div>
            <div class="icon-title">Recipe Book</div>
        </div>
    </div>

    <!-- RECIPE WINDOW -->
    <div id="grape-window" class="window">
        <div class="window-bar">
            Recipe Book
            <button id="close-grape">X</button>
        </div>
        <div class="window-content"></div>
    </div>

    <!-- NOTEPAD WINDOW -->
    <div id="notepad-window" class="window">
        <div class="window-bar">
            Notepad
            <button id="close-notepad">X</button>
        </div>

        <div class="content-container">
            <input type="text" placeholder="Title">
            <textarea placeholder="Write your note..."></textarea>
        </div>
    </div>

    <audio id="click-sound" src="sounds/click.mp3"></audio>

</div>

</body>
</html>
